<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apache Helicopter Viewer</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            overflow: hidden;
            color: #fff;
        }
        
        #canvas-container {
            width: 100vw;
            height: 100vh;
            position: relative;
        }
        
        #info-panel {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(0, 0, 0, 0.7);
            padding: 20px;
            border-radius: 10px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            min-width: 280px;
        }
        
        #info-panel h1 {
            font-size: 1.5rem;
            margin-bottom: 15px;
            color: #4fc3f7;
            border-bottom: 1px solid rgba(255, 255, 255, 0.2);
            padding-bottom: 10px;
        }
        
        .control-group {
            margin-bottom: 15px;
        }
        
        .control-group label {
            display: block;
            margin-bottom: 8px;
            font-size: 0.9rem;
            color: #b0bec5;
        }
        
        .slider-container {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        input[type="range"] {
            flex: 1;
            height: 6px;
            -webkit-appearance: none;
            background: linear-gradient(90deg, #4fc3f7, #00bcd4);
            border-radius: 3px;
            outline: none;
        }
        
        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 18px;
            height: 18px;
            background: #fff;
            border-radius: 50%;
            cursor: pointer;
            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.3);
        }
        
        .speed-value {
            min-width: 50px;
            text-align: right;
            font-size: 0.9rem;
            color: #4fc3f7;
        }
        
        #loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
        }
        
        .spinner {
            width: 50px;
            height: 50px;
            border: 4px solid rgba(255, 255, 255, 0.3);
            border-top-color: #4fc3f7;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 15px;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        #status {
            position: absolute;
            bottom: 20px;
            left: 20px;
            background: rgba(0, 0, 0, 0.7);
            padding: 10px 15px;
            border-radius: 5px;
            font-size: 0.85rem;
            backdrop-filter: blur(10px);
        }
        
        .status-item {
            margin: 5px 0;
        }
        
        .status-item span {
            color: #4fc3f7;
        }
        
        #controls-help {
            position: absolute;
            bottom: 20px;
            right: 20px;
            background: rgba(0, 0, 0, 0.7);
            padding: 15px;
            border-radius: 8px;
            font-size: 0.85rem;
            backdrop-filter: blur(10px);
        }
        
        #controls-help h3 {
            color: #4fc3f7;
            margin-bottom: 10px;
        }
        
        #controls-help p {
            margin: 5px 0;
            color: #b0bec5;
        }
        
        /* On-screen control buttons */
        #mobile-controls {
            position: absolute;
            bottom: 100px;
            right: 20px;
            z-index: 100;
        }
        
        #controls-left {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
        }
        
        .middle-row {
            display: flex;
            gap: 5px;
            align-items: center;
        }
        
        .ctrl-btn {
            width: 70px;
            height: 70px;
            border: 2px solid rgba(79, 195, 247, 0.6);
            border-radius: 12px;
            background: rgba(0, 0, 0, 0.6);
            color: #4fc3f7;
            font-size: 24px;
            font-weight: bold;
            cursor: pointer;
            backdrop-filter: blur(10px);
            transition: all 0.1s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            user-select: none;
            -webkit-user-select: none;
            touch-action: manipulation;
        }
        
        .ctrl-btn small {
            font-size: 10px;
            opacity: 0.7;
            margin-top: 2px;
        }
        
        .ctrl-btn:hover {
            background: rgba(79, 195, 247, 0.2);
        }
        
        .ctrl-btn:active,
        .ctrl-btn.active {
            background: rgba(79, 195, 247, 0.4);
            border-color: #4fc3f7;
            transform: scale(0.95);
        }
        
        /* Hide controls on larger screens (optional - remove if you want them always visible) */
        @media (min-width: 2768px) {
            #mobile-controls {
                display: none;
            }
        }
    </style>
    
    <script type="importmap">
    {
        "imports": {
            "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
            "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
        }
    }
    </script>
</head>
<body>
    <div id="canvas-container"></div>
    
    <div id="loading">
        <div class="spinner"></div>
        <p>Loading Apache Helicopter Model...</p>
    </div>
    
    <div id="info-panel">
        <h1>Apache AH-64 Viewer</h1>
        
        <div class="control-group">
            <label>Main Rotor Speed</label>
            <div class="slider-container">
                <input type="range" id="main-rotor-speed" min="0" max="100" value="50">
                <span class="speed-value" id="main-speed-value">50%</span>
            </div>
        </div>
        
        <div class="control-group">
            <label>Tail Rotor Speed</label>
            <div class="slider-container">
                <input type="range" id="tail-rotor-speed" min="0" max="100" value="50">
                <span class="speed-value" id="tail-speed-value">50%</span>
            </div>
        </div>
        
        <div class="control-group">
            <label>Terrain Texture</label>
            <select id="terrain-select" style="width: 100%; padding: 8px; background: rgba(0,0,0,0.5); color: #fff; border: 1px solid rgba(255,255,255,0.2); border-radius: 4px;">
                <option value="">Loading...</option>
            </select>
        </div>
    </div>
    
    <div id="status">
        <div class="status-item">Main Rotor: <span id="main-rotor-status">Not Detected</span></div>
        <div class="status-item">Tail Rotor: <span id="tail-rotor-status">Not Detected</span></div>
    </div>
    
    <div id="controls-help">
        <h3>Controls</h3>
        <p>UP(W) - speed forward, DOWN(S) - break, (LEFT)A, (RIGHT)D</p>
        <p>🖱️ Left Click + Drag: Camera orbit</p>
        <p>🖱️ Scroll: Zoom</p>
    </div>

    <!-- On-screen control buttons -->
    <div id="mobile-controls">
        <div id="controls-left">
            <button class="ctrl-btn" id="btn-forward" data-key="ArrowUp">▲<br><small>W/↑</small></button>
            <div class="middle-row">
                <button class="ctrl-btn" id="btn-left" data-key="ArrowLeft">◄<br><small>A/←</small></button>
                <button class="ctrl-btn" id="btn-backward" data-key="ArrowDown">▼<br><small>S/↓</small></button>
                <button class="ctrl-btn" id="btn-right" data-key="ArrowRight">►<br><small>D/→</small></button>
            </div>
        </div>
    </div>

    <script>
        // Hide controls help after 10 seconds
        setTimeout(() => {
            const controlsHelp = document.getElementById('controls-help');
            if (controlsHelp) {
                controlsHelp.style.transition = 'opacity 1s ease';
                controlsHelp.style.opacity = '0';
                setTimeout(() => {
                    controlsHelp.style.display = 'none';
                }, 1000);
            }
        }, 10000);
    </script>

    <script type="module" src="js/viewer.js"></script>
</body>
</html>
